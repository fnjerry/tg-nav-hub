<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="从 Telegram 频道收录的优质站点导航" />
  <title>TG 导航收录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080a0f;
      --surface: #10141c;
      --surface-2: #161b26;
      --border: rgba(255, 255, 255, 0.07);
      --border-strong: rgba(255, 255, 255, 0.12);
      --text: #f1f5f9;
      --muted: #8b9cb3;
      --accent: #5eead4;
      --accent-2: #818cf8;
      --radius: 16px;
      --radius-sm: 10px;
      --font: "DM Sans", "Noto Sans SC", system-ui, sans-serif;
      --header-h: 64px;
      --shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      color: var(--text);
      background: var(--bg);
      line-height: 1.5;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 80% 50% at 0% -20%, rgba(94, 234, 212, 0.12), transparent 50%),
        radial-gradient(ellipse 60% 40% at 100% 0%, rgba(129, 140, 248, 0.1), transparent 45%),
        radial-gradient(ellipse 50% 30% at 50% 100%, rgba(56, 189, 248, 0.06), transparent 50%);
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 20px 64px;
    }

    /* —— 顶栏 —— */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      margin: 0 -20px;
      padding: 12px 20px;
      background: rgba(8, 10, 15, 0.82);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s var(--ease);
    }
    .topbar.scrolled { border-bottom-color: var(--border); }

    .topbar-inner {
      display: flex;
      align-items: center;
      gap: 16px;
      max-width: 1180px;
      margin: 0 auto;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      text-decoration: none;
      color: inherit;
    }
    .logo-mark {
      width: 36px;
      height: 36px;
      border-radius: 11px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: grid;
      place-items: center;
      font-size: 0.72rem;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -0.04em;
    }
    .logo-text {
      font-weight: 700;
      font-size: 1.05rem;
      letter-spacing: -0.03em;
    }
    .logo-text span {
      display: block;
      font-size: 0.68rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0;
    }

    .search-wrap {
      flex: 1;
      max-width: 420px;
      margin-left: auto;
    }
    .search {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      height: 42px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search:focus-within {
      border-color: rgba(94, 234, 212, 0.45);
      box-shadow: 0 0 0 3px rgba(94, 234, 212, 0.12);
    }
    .search svg { opacity: 0.5; flex-shrink: 0; }
    .search input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font: inherit;
      font-size: 0.92rem;
    }
    .search input::placeholder { color: var(--muted); }
    .kbd-hint {
      font-size: 0.68rem;
      color: var(--muted);
      padding: 2px 6px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      flex-shrink: 0;
    }

    /* —— Hero —— */
    .hero {
      padding: 32px 0 8px;
    }
    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(1.75rem, 4vw, 2.25rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.2;
    }
    .hero p {
      margin: 0;
      max-width: 36em;
      color: var(--muted);
      font-size: 0.98rem;
    }
    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }
    .stat {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
    }
    .stat strong { font-weight: 600; color: var(--text); }
    .stat em { font-style: normal; color: var(--muted); }

    /* —— 分类条 —— */
    .cat-section {
      margin: 24px 0 28px;
    }
    .cat-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 12px;
    }
    .cat-head h2 {
      margin: 0;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .view-toggle {
      display: flex;
      gap: 4px;
      padding: 3px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
    }
    .view-toggle button {
      border: none;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 0.78rem;
      padding: 5px 12px;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .view-toggle button.on {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
    }

    .cat-rail-wrap {
      position: relative;
    }
    .cat-rail-wrap::before,
    .cat-rail-wrap::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 28px;
      pointer-events: none;
      z-index: 2;
    }
    .cat-rail-wrap::before {
      left: 0;
      background: linear-gradient(90deg, var(--bg), transparent);
    }
    .cat-rail-wrap::after {
      right: 0;
      background: linear-gradient(270deg, var(--bg), transparent);
    }

    .cat-rail {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 2px 8px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.15) transparent;
    }
    .cat-rail::-webkit-scrollbar { height: 5px; }
    .cat-rail::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.12);
      border-radius: 99px;
    }

    .chip {
      flex-shrink: 0;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font: inherit;
      font-size: 0.82rem;
      font-weight: 500;
      padding: 7px 14px;
      border-radius: 999px;
      transition: transform 0.15s var(--ease), border-color 0.15s, background 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .chip:hover { border-color: var(--border-strong); transform: translateY(-1px); }
    .chip.on {
      border-color: var(--chip-border, rgba(94, 234, 212, 0.5));
      background: var(--chip-bg, rgba(94, 234, 212, 0.12));
      color: var(--chip-text, var(--accent));
    }
    .chip .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--chip-dot, var(--accent));
    }
    .chip .n {
      font-size: 0.75rem;
      opacity: 0.7;
      font-weight: 500;
    }

    /* —— 内容区 —— */
    .section-block { margin-bottom: 36px; }
    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 14px;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .section-title .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--sec-dot, var(--accent));
    }
    .section-title .cnt {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
      align-items: start;
    }

    .card {
      position: relative;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--border);
      transition: transform 0.2s var(--ease), border-color 0.2s, box-shadow 0.2s;
      overflow: hidden;
    }
    .card:hover {
      transform: translateY(-2px);
      border-color: var(--border-strong);
      box-shadow: var(--shadow);
    }
    .card a.hit {
      display: flex;
      gap: 14px;
      padding: 16px 16px 12px;
      text-decoration: none;
      color: inherit;
    }
    .card-icon {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    .card-icon img {
      width: 24px;
      height: 24px;
      object-fit: contain;
    }
    .card-icon .fallback {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
    }
    .card-body { min-width: 0; flex: 1; }
    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .card-title {
      margin: 0;
      font-size: 0.98rem;
      font-weight: 600;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-time {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 4px 0 8px;
      padding: 3px 8px 3px 6px;
      border-radius: 6px;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      letter-spacing: 0.02em;
    }
    .card-time svg {
      flex-shrink: 0;
      opacity: 0.65;
    }
    .card-time time {
      font-variant-numeric: tabular-nums;
    }
    .card-cat {
      flex-shrink: 0;
      font-size: 0.68rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 6px;
      background: var(--cat-bg, rgba(94, 234, 212, 0.12));
      color: var(--cat-text, var(--accent));
      border: 1px solid var(--cat-border, rgba(94, 234, 212, 0.25));
    }
    .card-host {
      margin: 0 0 8px;
      font-size: 0.8rem;
      color: var(--accent);
      opacity: 0.9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-intro {
      margin: 0 12px 12px;
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid var(--border);
      border-left: 2px solid rgba(94, 234, 212, 0.35);
      overflow: hidden;
    }
    .card-intro > summary {
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 12px;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      transition: color 0.15s, background 0.15s;
    }
    .card-intro > summary:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.03);
    }
    .card-intro > summary::-webkit-details-marker {
      display: none;
    }
    .card-intro > summary::after {
      flex-shrink: 0;
      font-size: 0.72rem;
      color: var(--accent);
      opacity: 0.85;
    }
    .card-intro:not([open]) > summary::after {
      content: "展开";
    }
    .card-intro[open] > summary::after {
      content: "收起";
    }
    .card-intro[open] > summary {
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    .card-desc {
      margin: 0;
      padding: 10px 12px 12px;
      font-size: 0.84rem;
      color: var(--muted);
      line-height: 1.65;
      word-break: break-word;
    }
    .card-foot {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
    }
    .tag {
      font-size: 0.68rem;
      padding: 2px 7px;
      border-radius: 6px;
      background: rgba(129, 140, 248, 0.1);
      border: 1px solid rgba(129, 140, 248, 0.2);
      color: #c7d2fe;
    }
    .card-meta {
      margin-left: auto;
      font-size: 0.68rem;
      color: var(--muted);
      opacity: 0.85;
    }

    /* 骨架屏 */
  .skeleton-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
    }
    .skel {
      height: 108px;
      border-radius: var(--radius);
      background: linear-gradient(
        90deg,
        var(--surface) 0%,
        var(--surface-2) 50%,
        var(--surface) 100%
      );
      background-size: 200% 100%;
      animation: shimmer 1.2s ease-in-out infinite;
      border: 1px solid var(--border);
    }
    @keyframes shimmer {
      0% { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }

    .empty, .err {
      padding: 56px 24px;
      text-align: center;
      border-radius: var(--radius);
      border: 1px dashed var(--border);
      background: var(--surface);
    }
    .empty h3, .err h3 {
      margin: 0 0 8px;
      font-size: 1.05rem;
      font-weight: 600;
    }
    .empty p, .err p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .api-warn {
      margin: 0 0 16px;
      padding: 12px 16px;
      border-radius: var(--radius);
      background: rgba(234, 179, 8, 0.12);
      border: 1px solid rgba(234, 179, 8, 0.35);
      color: var(--text);
      font-size: 0.88rem;
      line-height: 1.5;
      max-width: 28em;
      margin-inline: auto;
    }

    footer {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      .topbar-inner { flex-wrap: wrap; }
      .search-wrap { max-width: none; width: 100%; order: 3; }
      .logo-text span { display: none; }
      .kbd-hint { display: none; }
      .grid { grid-template-columns: 1fr; }
      .view-toggle { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      .card:hover { transform: none; }
      .skel { animation: none; }
      html { scroll-behavior: auto; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar" id="topbar">
      <div class="topbar-inner">
        <a class="logo" href="/" aria-label="返回首页">
          <div class="logo-mark" aria-hidden="true">TG</div>
          <div class="logo-text">
            导航收录
            <span>Telegram 频道精选</span>
          </div>
        </a>
        <div class="search-wrap">
          <label class="search" aria-label="搜索站点">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M11 19a8 8 0 1 1 0-16 8 8 0 0 1 0 16Zm9 2-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <input id="q" type="search" placeholder="搜索标题、域名、标签…" autocomplete="off" />
            <span class="kbd-hint" aria-hidden="true">/</span>
          </label>
        </div>
      </div>
    </header>

    <section class="hero">
      <h1>发现频道里的好站</h1>
      <p>自动收录公开频道中的外链。优先根据正文里的 <strong>#标签</strong> 智能归入规范类目；无匹配规则时保留标签名作为分类。</p>
      <div class="stats" id="stats">
        <div class="stat"><strong id="stat-total">—</strong><em> 条收录</em></div>
        <div class="stat"><strong id="stat-cats">—</strong><em> 个分类</em></div>
        <div class="stat" id="stat-filter-wrap" hidden><strong id="stat-filter">—</strong><em> 当前筛选</em></div>
      </div>
    </section>

    <section class="cat-section">
      <div class="cat-head">
        <h2>浏览分类</h2>
        <div class="view-toggle" role="group" aria-label="列表视图">
          <button type="button" id="view-grouped">分组</button>
          <button type="button" id="view-flat" class="on">平铺</button>
        </div>
      </div>
      <div class="cat-rail-wrap">
        <nav class="cat-rail" id="cat-bar" aria-label="分类筛选"></nav>
      </div>
    </section>

    <main id="root" aria-live="polite"></main>

    <footer>由 Telegram 频道同步 · 本地私有部署</footer>
  </div>

  <script>
    const root = document.getElementById("root");
    const qEl = document.getElementById("q");
    const catBar = document.getElementById("cat-bar");
    const topbar = document.getElementById("topbar");
    const statTotal = document.getElementById("stat-total");
    const statCats = document.getElementById("stat-cats");
    const statFilterWrap = document.getElementById("stat-filter-wrap");
    const statFilter = document.getElementById("stat-filter");
    const viewGroupedBtn = document.getElementById("view-grouped");
    const viewFlatBtn = document.getElementById("view-flat");

    let timer;
    let currentCategory = "";
    let categoryCounts = [];
    let viewMode = "flat";

    function newestKey(item) {
      const msgId = Number(item.message_id) || 0;
      const ts = parseCollectedAt(item.created_at)?.getTime() || 0;
      return [msgId, ts, Number(item.id) || 0];
    }

    function compareNewest(a, b) {
      const ka = newestKey(a);
      const kb = newestKey(b);
      for (let i = 0; i < ka.length; i++) {
        if (kb[i] !== ka[i]) return kb[i] - ka[i];
      }
      return 0;
    }

    function sortNewest(items) {
      return [...items].sort(compareNewest);
    }

    const CAT_THEME = {
      AI: { bg: "rgba(167, 139, 250, 0.15)", text: "#c4b5fd", border: "rgba(167, 139, 250, 0.35)", dot: "#a78bfa" },
      开发: { bg: "rgba(56, 189, 248, 0.12)", text: "#7dd3fc", border: "rgba(56, 189, 248, 0.3)", dot: "#38bdf8" },
      设计: { bg: "rgba(244, 114, 182, 0.12)", text: "#f9a8d4", border: "rgba(244, 114, 182, 0.3)", dot: "#f472b6" },
      工具: { bg: "rgba(94, 234, 212, 0.12)", text: "#5eead4", border: "rgba(94, 234, 212, 0.3)", dot: "#2dd4bf" },
      效率: { bg: "rgba(52, 211, 153, 0.12)", text: "#6ee7b7", border: "rgba(52, 211, 153, 0.3)", dot: "#34d399" },
      影音: { bg: "rgba(251, 113, 133, 0.12)", text: "#fda4af", border: "rgba(251, 113, 133, 0.3)", dot: "#fb7185" },
      视频: { bg: "rgba(251, 113, 133, 0.12)", text: "#fda4af", border: "rgba(251, 113, 133, 0.3)", dot: "#fb7185" },
      资讯: { bg: "rgba(250, 204, 21, 0.1)", text: "#fde047", border: "rgba(250, 204, 21, 0.28)", dot: "#facc15" },
      资源: { bg: "rgba(129, 140, 248, 0.12)", text: "#a5b4fc", border: "rgba(129, 140, 248, 0.3)", dot: "#818cf8" },
      阅读: { bg: "rgba(148, 163, 184, 0.12)", text: "#cbd5e1", border: "rgba(148, 163, 184, 0.3)", dot: "#94a3b8" },
      产品: { bg: "rgba(251, 146, 60, 0.12)", text: "#fdba74", border: "rgba(251, 146, 60, 0.3)", dot: "#fb923c" },
      游戏: { bg: "rgba(192, 132, 252, 0.12)", text: "#d8b4fe", border: "rgba(192, 132, 252, 0.3)", dot: "#c084fc" },
      安全: { bg: "rgba(248, 113, 113, 0.12)", text: "#fca5a5", border: "rgba(248, 113, 113, 0.3)", dot: "#f87171" },
      学术: { bg: "rgba(96, 165, 250, 0.12)", text: "#93c5fd", border: "rgba(96, 165, 250, 0.3)", dot: "#60a5fa" },
      社区: { bg: "rgba(45, 212, 191, 0.1)", text: "#5eead4", border: "rgba(45, 212, 191, 0.28)", dot: "#2dd4bf" },
      职场: { bg: "rgba(251, 191, 36, 0.1)", text: "#fcd34d", border: "rgba(251, 191, 36, 0.28)", dot: "#fbbf24" },
      音乐: { bg: "rgba(236, 72, 153, 0.12)", text: "#f9a8d4", border: "rgba(236, 72, 153, 0.3)", dot: "#ec4899" },
      未分类: { bg: "rgba(148, 163, 184, 0.1)", text: "#94a3b8", border: "rgba(148, 163, 184, 0.25)", dot: "#64748b" },
    };
    const DEFAULT_THEME = CAT_THEME["未分类"];

    function themeFor(cat) {
      return CAT_THEME[cat] || DEFAULT_THEME;
    }

    function applyChipTheme(el, cat) {
      const t = themeFor(cat);
      el.style.setProperty("--chip-bg", t.bg);
      el.style.setProperty("--chip-text", t.text);
      el.style.setProperty("--chip-border", t.border);
      el.style.setProperty("--chip-dot", t.dot);
    }

    function applyCardCatTheme(el, cat) {
      const t = themeFor(cat);
      el.style.setProperty("--cat-bg", t.bg);
      el.style.setProperty("--cat-text", t.text);
      el.style.setProperty("--cat-border", t.border);
    }

    function applySectionTheme(el, cat) {
      const t = themeFor(cat);
      el.style.setProperty("--sec-dot", t.dot);
    }

    function parseCollectedAt(iso) {
      if (!iso) return null;
      let s = String(iso).trim();
      if (!s) return null;
      if (!/Z|[+-]\d{2}(:?\d{2})?$/i.test(s)) {
        s = s.includes("T") ? s + "Z" : s.replace(" ", "T") + "Z";
      }
      const d = new Date(s);
      return Number.isNaN(d.getTime()) ? null : d;
    }

    function formatCollectedAt(iso) {
      const d = parseCollectedAt(iso);
      if (!d) return { text: "发布时间未知", datetime: "" };
      const now = new Date();
      const pad = (n) => String(n).padStart(2, "0");
      const hm = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
      const ymd = `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
      const sameDay = d.toDateString() === now.toDateString();
      const yesterday = new Date(now);
      yesterday.setDate(now.getDate() - 1);
      const isYesterday = d.toDateString() === yesterday.toDateString();
      let text;
      if (sameDay) text = `今天 ${hm}`;
      else if (isYesterday) text = `昨天 ${hm}`;
      else text = `${ymd} ${hm}`;
      return { text, datetime: d.toISOString() };
    }

    function hostFromUrl(url) {
      try {
        return new URL(url).hostname.replace(/^www\./, "");
      } catch {
        return url;
      }
    }

    function faviconUrl(url) {
      const h = hostFromUrl(url);
      return `https://www.google.com/s2/favicons?domain=${encodeURIComponent(h)}&sz=64`;
    }

    function linksUrl() {
      const p = new URLSearchParams();
      const q = qEl.value.trim();
      if (q) p.set("q", q);
      if (currentCategory) p.set("category", currentCategory);
      const qs = p.toString();
      return qs ? `/api/links?${qs}` : "/api/links";
    }

    function showSkeleton() {
      root.innerHTML = `<div class="skeleton-grid" aria-busy="true">${"<div class=\"skel\"></div>".repeat(6)}</div>`;
    }

    function renderCatBar() {
      catBar.innerHTML = "";
      const total = categoryCounts.reduce((s, c) => s + c.count, 0);

      const all = document.createElement("button");
      all.type = "button";
      all.className = "chip" + (currentCategory === "" ? " on" : "");
      all.innerHTML = `<span class="dot"></span>全部<span class="n">${total}</span>`;
      applyChipTheme(all, "工具");
      if (currentCategory === "") applyChipTheme(all, "工具");
      all.addEventListener("click", () => {
        currentCategory = "";
        renderCatBar();
        load();
      });
      catBar.appendChild(all);

      for (const c of categoryCounts) {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "chip" + (currentCategory === c.name ? " on" : "");
        b.innerHTML = `<span class="dot"></span>${escapeHtml(c.name)}<span class="n">${c.count}</span>`;
        applyChipTheme(b, c.name);
        b.addEventListener("click", () => {
          currentCategory = c.name;
          renderCatBar();
          load();
        });
        catBar.appendChild(b);
      }
      statCats.textContent = String(categoryCounts.length);
    }

    function buildCard(item) {
      const cat = item.category || "未分类";
      const host = hostFromUrl(item.url);
      const tags = (item.tags || "").split(",").map((t) => t.trim()).filter(Boolean).slice(0, 4);
      const tagHtml = tags.map((t) => `<span class="tag">#${escapeHtml(t)}</span>`).join("");
      const letter = host.charAt(0) || "?";
      const collected = formatCollectedAt(item.created_at);

      const el = document.createElement("article");
      el.className = "card";
      const introHtml = item.description
        ? `<details class="card-intro">
            <summary>简介</summary>
            <p class="card-desc">${escapeHtml(item.description)}</p>
          </details>`
        : "";

      el.innerHTML = `
        <a class="hit" href="${escapeAttr(item.url)}" target="_blank" rel="noopener noreferrer">
          <div class="card-icon">
            <img src="${escapeAttr(faviconUrl(item.url))}" alt="" width="24" height="24" loading="lazy"
              onerror="this.style.display='none';this.nextElementSibling.style.display='grid'" />
            <span class="fallback" style="display:none">${escapeHtml(letter)}</span>
          </div>
          <div class="card-body">
            <div class="card-top">
              <h2 class="card-title">${escapeHtml(item.title || host)}</h2>
              <span class="card-cat" data-cat>${escapeHtml(cat)}</span>
            </div>
            <div class="card-time" title="频道发布时间">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.75"/>
                <path d="M12 7v5l3 2" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
              </svg>
              <span>发布</span>
              <time datetime="${escapeAttr(collected.datetime)}">${escapeHtml(collected.text)}</time>
            </div>
            <p class="card-host">${escapeHtml(host)}</p>
            <div class="card-foot">
              ${tagHtml}
              <span class="card-meta">@${escapeHtml(item.channel_username)}</span>
            </div>
          </div>
        </a>
        ${introHtml}`;

      applyCardCatTheme(el.querySelector("[data-cat]"), cat);

      const intro = el.querySelector("details.card-intro");
      if (intro) {
        intro.addEventListener("toggle", () => {
          if (!intro.open) return;
          document.querySelectorAll("details.card-intro[open]").forEach((other) => {
            if (other !== intro) other.open = false;
          });
        });
        intro.addEventListener("click", (e) => e.stopPropagation());
      }

      return el;
    }

    function renderFlat(items) {
      const grid = document.createElement("div");
      grid.className = "grid";
      for (const item of sortNewest(items)) grid.appendChild(buildCard(item));
      root.appendChild(grid);
    }

    function renderGrouped(items) {
      const order = categoryCounts.map((c) => c.name);
      const buckets = new Map();
      for (const item of items) {
        const cat = item.category || "未分类";
        if (!buckets.has(cat)) buckets.set(cat, []);
        buckets.get(cat).push(item);
      }
      const cats = [...new Set([...order.filter((n) => buckets.has(n)), ...buckets.keys()])];
      cats.sort((a, b) => {
        const maxA = Math.max(...(buckets.get(a)?.map((x) => newestKey(x)[0]) || [0]));
        const maxB = Math.max(...(buckets.get(b)?.map((x) => newestKey(x)[0]) || [0]));
        return maxB - maxA;
      });
      for (const cat of cats) {
        const list = sortNewest(buckets.get(cat) || []);
        if (!list.length) continue;
        const block = document.createElement("section");
        block.className = "section-block";
        const h = document.createElement("h3");
        h.className = "section-title";
        h.innerHTML = `<span class="dot"></span>${escapeHtml(cat)}<span class="cnt">${list.length}</span>`;
        applySectionTheme(h, cat);
        block.appendChild(h);
        const grid = document.createElement("div");
        grid.className = "grid";
        for (const item of list) grid.appendChild(buildCard(item));
        block.appendChild(grid);
        root.appendChild(block);
      }
    }

    function updateStats(len) {
      statTotal.textContent = String(len);
      if (currentCategory || qEl.value.trim()) {
        statFilterWrap.hidden = false;
        const parts = [];
        if (currentCategory) parts.push(currentCategory);
        if (qEl.value.trim()) parts.push(`「${qEl.value.trim()}」`);
        statFilter.textContent = parts.join(" · ");
      } else {
        statFilterWrap.hidden = true;
      }
    }

    async function loadCategories() {
      try {
        const res = await fetch("/api/categories");
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        categoryCounts = await res.json();
      } catch {
        categoryCounts = [];
      }
      renderCatBar();
    }

    async function load() {
      showSkeleton();
      try {
        const res = await fetch(linksUrl());
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        root.innerHTML = "";
        updateStats(data.length);

        if (data.length && data[0].created_at == null && !("created_at" in data[0])) {
          const warn = document.createElement("div");
          warn.className = "api-warn";
          warn.setAttribute("role", "status");
          warn.textContent =
            "当前连接的后端版本过旧，未返回收录时间。请关闭所有旧终端后重新运行 .\\run.ps1，再强制刷新本页。";
          root.appendChild(warn);
        }

        if (!data.length) {
          root.innerHTML = `
            <div class="empty">
              <h3>暂无收录</h3>
              <p>尝试切换「全部」或清空搜索。若刚配置频道，请在后端执行同步后再刷新本页。</p>
            </div>`;
          return;
        }

        const useGrouped =
          viewMode === "grouped" && !currentCategory && !qEl.value.trim();
        if (useGrouped) renderGrouped(data);
        else renderFlat(data);
      } catch (e) {
        root.innerHTML = `
          <div class="err">
            <h3>加载失败</h3>
            <p>${escapeHtml(String(e.message || e))}</p>
          </div>`;
      }
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }
    function escapeAttr(s) {
      return escapeHtml(s).replace(/'/g, "&#39;");
    }

    qEl.addEventListener("input", () => {
      clearTimeout(timer);
      timer = setTimeout(load, 220);
    });

    viewGroupedBtn.addEventListener("click", () => {
      viewMode = "grouped";
      viewGroupedBtn.classList.add("on");
      viewFlatBtn.classList.remove("on");
      load();
    });
    viewFlatBtn.addEventListener("click", () => {
      viewMode = "flat";
      viewFlatBtn.classList.add("on");
      viewGroupedBtn.classList.remove("on");
      load();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "/" && document.activeElement !== qEl) {
        e.preventDefault();
        qEl.focus();
      }
    });

    window.addEventListener("scroll", () => {
      topbar.classList.toggle("scrolled", window.scrollY > 8);
    }, { passive: true });

    (async () => {
      await loadCategories();
      await load();
    })();
  </script>
</body>
</html>
